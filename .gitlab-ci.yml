stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.10-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - python -m pytest tests/ -v

docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t family-zoo .
  only:
    - main