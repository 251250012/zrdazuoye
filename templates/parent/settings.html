{% extends "base.html" %}
{% block title %}设置 - 小小动物园{% endblock %}
{% block content %}
<h1>⚙️ 设置</h1>

<div class="settings-section">
    <h2>👤 修改自己的密码</h2>
    <form method="POST" class="settings-form">
        <input type="hidden" name="action" value="change_password">
        <input type="hidden" name="user_id" value="{{ session.user_id }}">
        <div class="form-group">
            <label>新密码</label>
            <input type="password" name="new_password" required>
        </div>
        <button type="submit" class="btn-primary">修改密码</button>
    </form>
</div>

<div class="settings-section">
    <h2>👶 创建孩子账号</h2>
    <form method="POST" class="settings-form">
        <input type="hidden" name="action" value="create_child">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>显示名称（孩子的小名）</label>
            <input type="text" name="display_name" required>
        </div>
        <div class="form-group">
            <label>年级</label>
            <select name="grade">
                {% for g in grades %}
                <option value="{{ loop.index0 }}">{{ g }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-primary">创建</button>
    </form>
</div>

{% if children %}
<div class="settings-section">
    <h2>👶 管理孩子账号</h2>
    {% for child in children %}
    <div class="child-settings-card">
        <h3>{{ child.display_name }}（{{ child.username }}）</h3>
        <form method="POST" class="inline-form">
            <input type="hidden" name="action" value="change_grade">
            <input type="hidden" name="child_id" value="{{ child.id }}">
            <label>年级：</label>
            <select name="grade">
                {% for g in grades %}
                <option value="{{ loop.index0 }}" {% if loop.index0 == child.grade %}selected{% endif %}>{{ g }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-primary btn-small">更新</button>
        </form>
        <form method="POST" class="inline-form">
            <input type="hidden" name="action" value="change_password">
            <input type="hidden" name="user_id" value="{{ child.id }}">
            <label>新密码：</label>
            <input type="password" name="new_password" required>
            <button type="submit" class="btn-primary btn-small">修改密码</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endblock %}
